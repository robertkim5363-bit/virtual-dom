<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual DOM & Diff — Camp David Satellite View</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2332;--border:#2a3a50;
  --text:#e4e8f0;--text2:#8b9ab8;--muted:#5c6a80;
  --accent:#4285f4;--green:#34a853;--red:#ea4335;--yellow:#fbbc04;--blue:#4fc3f7;--earth-dark:#0d1b2a;
  --radius:10px;--mono:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:0 20px 40px}
header{text-align:center;padding:28px 0 12px}
header h1{font-size:1.7rem;background:linear-gradient(135deg,#4285f4,#34a853,#fbbc04,#ea4335);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text2);font-size:.88rem;margin-top:4px}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;user-select:none}
.btn:hover:not(:disabled){background:#1e2d3d;border-color:#4a6280}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-patch{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;padding:10px 32px;box-shadow:0 0 20px #4285f440}
.btn-patch:hover:not(:disabled){background:#3367d6}
.btn-small{padding:4px 12px;font-size:.75rem}
#history-indicator{font-family:var(--mono);font-size:.8rem;color:var(--muted);background:var(--bg2);padding:6px 14px;border-radius:6px;border:1px solid var(--border)}
.main{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1400px;margin:0 auto}
@media(max-width:860px){.main{grid-template-columns:1fr}}
.panel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.panel-head{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.panel-head h2{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:10px}
.panel-head small{font-size:.78rem;color:var(--muted)}
.badge{font-size:.65rem;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.badge-edit{background:rgba(66,133,244,.15);color:var(--accent);border-color:rgba(66,133,244,.3)}
.panel-body{padding:0;min-height:400px;max-height:600px;overflow-y:auto;position:relative}
.panel-body::-webkit-scrollbar{width:6px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* 편집 도구 모음 */
.edit-toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);background:rgba(66,133,244,.04)}
.tool-btn{padding:5px 10px;font-size:.7rem;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tool-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-btn.danger:hover{background:var(--red);border-color:var(--red)}
/* 선택된 요소 하이라이트 */
.el-selected{outline:2px solid var(--accent)!important;outline-offset:2px;position:relative}
.el-selected::after{content:'✎';position:absolute;top:-10px;right:-10px;background:var(--accent);color:#fff;font-size:.6rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
/* 속성 편집 모달 */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:24px;min-width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h3{font-size:1rem;margin-bottom:16px;color:var(--accent)}
.modal-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.modal-row input{flex:1;padding:6px 10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:.82rem;font-family:var(--mono)}
.modal-row input:focus{outline:none;border-color:var(--accent)}
.modal-row .del-attr{padding:4px 8px;background:var(--red);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.7rem}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-btns .btn{padding:7px 18px;font-size:.8rem}
.modal-btns .btn-save{background:var(--accent);border-color:var(--accent);color:#fff}
/* 태그 변경 셀렉트 */
.tag-select{padding:4px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:.75rem;font-family:var(--mono)}
/* contenteditable 영역 */
#test-area{outline:none;cursor:default}
#test-area:focus{box-shadow:inset 0 0 0 2px rgba(66,133,244,.1)}
/* 로그 */
.log-section{max-width:1400px;margin:20px auto 0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.log-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
.log-head h2{font-size:.9rem;font-weight:600}
#diff-log{padding:12px 20px;max-height:220px;overflow-y:auto;font-family:var(--mono);font-size:.78rem;line-height:1.8}
.log-entry{padding:2px 0;border-left:3px solid transparent;padding-left:10px;margin-bottom:2px}
.log-time{color:var(--muted);margin-right:6px}
.log-info{border-left-color:var(--blue);color:var(--text2)}
.log-create{border-left-color:var(--green);color:var(--green)}
.log-remove{border-left-color:var(--red);color:var(--red)}
.log-replace{border-left-color:var(--yellow);color:var(--yellow)}
.log-update{border-left-color:var(--blue);color:var(--blue)}
.log-divider{color:var(--muted);text-align:center;border-left-color:transparent;padding:4px 0;font-weight:600;letter-spacing:.1em}

/* SATELLITE VIEW */
.sat-view{position:relative;width:100%;min-height:400px;background:#1a2b14;
  background-image:url('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/export?bbox=-77.478,39.643,-77.452,39.657&bboxSR=4326&size=600,520&format=png&f=image');
  background-size:cover;background-position:center;
  --sat-url:url('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/export?bbox=-77.478,39.643,-77.452,39.657&bboxSR=4326&size=600,520&format=png&f=image');
  overflow:hidden}

/* ROADS */
.sat-road{position:absolute;background:rgba(120,110,90,.35);z-index:2}
.sat-road-h{height:3px;width:100%}
.sat-road-v{width:3px;height:100%}

/* BUILDINGS */
.sat-bldg{position:absolute;z-index:3;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.4)}

/* HELIPAD */
.helipad-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5}
.helipad-circle{width:100px;height:100px;border-radius:50%;border:3px solid rgba(255,255,255,.35);background:rgba(140,135,120,.5);display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 0 30px rgba(0,0,0,.4)}
.helipad-h{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;font-size:42px;font-weight:900;color:rgba(255,255,255,.65);text-shadow:0 0 8px rgba(0,0,0,.5)}

/* TILE GRID (10x10 = 100 tiles) */
.tile-grid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:grid;grid-template-columns:repeat(10,18px);grid-template-rows:repeat(10,18px);gap:1px;z-index:10;pointer-events:none}
.tile{width:18px;height:18px;border-radius:1px;transition:all .4s ease}
.tile-clear{background:transparent;border:1px solid rgba(255,255,255,.03)}
.tile-forest{
  background:
    radial-gradient(circle 3px at 30% 40%,#2d5a1e 0%,transparent 100%),
    radial-gradient(circle 4px at 70% 30%,#1e4a12 0%,transparent 100%),
    radial-gradient(circle 3px at 50% 70%,#3a6b2a 0%,transparent 100%),
    linear-gradient(135deg,#1e3318,#2a4f1e,#1a2b14);
  border:1px solid rgba(30,51,24,.5);
  box-shadow:inset 0 0 4px rgba(0,0,0,.3)}
/* AUTO-TERRAIN CAMO: tiles inherit satellite background */
.tile-camo{
  background-image: var(--sat-url);
  background-size: 600px 520px;
  border:1px solid rgba(30,51,24,.15);
  box-shadow:inset 0 0 2px rgba(0,0,0,.2);
  opacity:.92}

/* TERRAIN SCAN STATUS */
.terrain-status{margin-top:10px;padding:8px;background:rgba(52,168,83,.05);border-radius:4px;border:1px solid rgba(52,168,83,.15);font-family:var(--mono);font-size:.55rem;color:var(--green);letter-spacing:.05em}
.terrain-status .scan-line{display:flex;justify-content:space-between;padding:1px 0}
.terrain-status .scan-val{color:var(--yellow)}

/* SECURITY PANEL */
.sec-panel{position:absolute;top:12px;right:12px;z-index:20;width:260px;background:rgba(13,17,23,.92);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);padding:16px}
.sec-header{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--yellow);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-header::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sec-status{font-family:var(--mono);font-size:.65rem;color:var(--text2);margin-bottom:10px;padding:8px;background:rgba(0,0,0,.3);border-radius:4px;border:1px solid var(--border)}
.sec-status-line{display:flex;justify-content:space-between;padding:2px 0}
.sec-status-val{color:var(--green)}
.sec-status-val.alert{color:var(--red);animation:pulse 1.5s infinite}

/* CAMO TOGGLE */
.camo-toggle-wrap{margin-top:12px;padding:12px;background:rgba(255,61,61,.05);border:1px solid rgba(255,61,61,.15);border-radius:6px}
.camo-toggle-wrap.active{background:rgba(52,168,83,.05);border-color:rgba(52,168,83,.2)}
.camo-label{font-family:var(--mono);font-size:.65rem;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.camo-label .icon{font-size:.9rem}
.camo-switch{display:flex;align-items:center;gap:10px;cursor:pointer}
.camo-switch-track{width:44px;height:22px;border-radius:11px;background:rgba(234,67,53,.3);position:relative;transition:background .3s;border:1px solid rgba(234,67,53,.3)}
.camo-switch-track.on{background:rgba(52,168,83,.3);border-color:rgba(52,168,83,.3)}
.camo-switch-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.camo-switch-track.on .camo-switch-knob{left:24px}
.camo-switch-text{font-family:var(--mono);font-size:.7rem;font-weight:600;letter-spacing:.1em}
.camo-switch-text.off{color:var(--red)}
.camo-switch-text.on-text{color:var(--green)}

/* MAP LABELS */
.map-label{position:absolute;z-index:8;font-family:var(--mono);font-size:.55rem;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,.6)}

/* COORD DISPLAY */
.coord-bar{position:absolute;bottom:0;left:0;right:0;z-index:15;padding:4px 12px;background:rgba(10,14,23,.85);border-top:1px solid var(--border);display:flex;gap:16px;font-family:var(--mono);font-size:.58rem;color:var(--text2)}
.coord-lbl{color:var(--green);font-weight:600;margin-right:4px}

/* DEFCON */
.defcon-bar{position:absolute;top:12px;left:12px;z-index:20;display:flex;gap:3px;align-items:center}
.defcon-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
.defcon-3{background:var(--green);box-shadow:0 0 6px var(--green)}
.defcon-4{background:rgba(255,255,255,.15)}
.defcon-label{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;font-size:.5rem;letter-spacing:.15em;color:var(--yellow);margin-left:6px}

/* CLASSIFICATION BANNER */
.classif-banner{position:absolute;top:0;left:0;right:0;z-index:25;text-align:center;padding:2px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;font-size:.5rem;letter-spacing:.25em;color:#fff;background:var(--red)}
</style>
</head>
<body>

<header>
  <h1>Virtual DOM & Diff — Camp David Explorer</h1>
  <p>가상 DOM으로 Camp David 위성 보안 시스템의 변경 사항을 효율적으로 관리</p>
</header>

<div class="controls">
  <button id="btn-undo" class="btn" disabled>&#9664; 뒤로가기</button>
  <button id="btn-patch" class="btn btn-patch">&#9654; Patch</button>
  <button id="btn-redo" class="btn" disabled>앞으로가기 &#9654;</button>
  <span id="history-indicator">State: 1 / 1</span>
</div>

<main class="main">
  <!-- 실제 영역 -->
  <section class="panel">
    <div class="panel-head">
      <h2>실제 영역 <span class="badge">Read-Only</span></h2>
      <small>Diff 결과가 patch되는 실제 DOM</small>
    </div>
    <div id="actual-area" class="panel-body"></div>
  </section>

  <!-- 테스트 영역 -->
  <section class="panel">
    <div class="panel-head">
      <h2>테스트 영역 <span class="badge badge-edit">Editable</span></h2>
      <small>요소 클릭 후 도구를 사용하여 수정</small>
    </div>
    <div class="edit-toolbar" id="edit-toolbar">
      <button class="tool-btn" onclick="toolMoveUp()" title="선택 요소를 위로 이동">▲ 위로</button>
      <button class="tool-btn" onclick="toolMoveDown()" title="선택 요소를 아래로 이동">▼ 아래로</button>
      <button class="tool-btn" onclick="toolEditAttrs()" title="선택 요소의 속성 편집">⚙ 속성</button>
      <button class="tool-btn" onclick="toolChangeTag()" title="선택 요소의 태그 변경">⟨⟩ 태그</button>
      <button class="tool-btn" onclick="toolDuplicate()" title="선택 요소 복제">⧉ 복제</button>
      <button class="tool-btn" onclick="toolAddChild()" title="선택 요소 안에 자식 추가">+ 자식</button>
      <button class="tool-btn" onclick="toolAddSibling()" title="선택 요소 뒤에 형제 추가">+ 형제</button>
      <button class="tool-btn" onclick="toolWrapEl()" title="선택 요소를 div로 감싸기">⊞ 감싸기</button>
      <button class="tool-btn danger" onclick="toolDelete()" title="선택 요소 삭제">✕ 삭제</button>
    </div>
    <div id="test-area" class="panel-body" contenteditable="true"></div>
  </section>
</main>

<!-- 속성 편집 모달 -->
<div class="modal-overlay" id="attr-modal">
  <div class="modal">
    <h3>속성 편집</h3>
    <div id="attr-list"></div>
    <button class="tool-btn" onclick="addAttrRow('','')" style="margin-top:8px">+ 속성 추가</button>
    <div class="modal-btns">
      <button class="btn" onclick="closeAttrModal()">취소</button>
      <button class="btn btn-save" onclick="saveAttrs()">저장</button>
    </div>
  </div>
</div>

<!-- 태그 변경 모달 -->
<div class="modal-overlay" id="tag-modal">
  <div class="modal">
    <h3>태그 변경</h3>
    <p style="font-size:.82rem;color:var(--text2);margin-bottom:12px">현재 태그: <strong id="current-tag-display" style="color:var(--accent)"></strong></p>
    <select id="tag-select" class="tag-select" style="width:100%;padding:8px">
      <option value="div">div</option>
      <option value="span">span</option>
      <option value="p">p</option>
      <option value="h1">h1</option>
      <option value="h2">h2</option>
      <option value="h3">h3</option>
      <option value="h4">h4</option>
      <option value="section">section</option>
      <option value="article">article</option>
      <option value="ul">ul</option>
      <option value="ol">ol</option>
      <option value="li">li</option>
      <option value="strong">strong</option>
      <option value="em">em</option>
      <option value="a">a</option>
      <option value="button">button</option>
      <option value="header">header</option>
      <option value="footer">footer</option>
      <option value="nav">nav</option>
    </select>
    <div class="modal-btns">
      <button class="btn" onclick="closeTagModal()">취소</button>
      <button class="btn btn-save" onclick="saveTagChange()">변경</button>
    </div>
  </div>
</div>

<section class="log-section">
  <div class="log-head">
    <h2>Diff Log</h2>
    <button id="btn-clear" class="btn btn-small">Clear</button>
  </div>
  <div id="diff-log"></div>
</section>

<script>
/* ========== CAMP DAVID HELIPAD H-PATTERN ========== */
const H_TILES = new Set([
  '1-1','2-1','3-1','4-1','5-1','6-1','7-1',
  '4-2','4-3','4-4','4-5','4-6','4-7',
  '1-8','2-8','3-8','4-8','5-8','6-8','7-8'
]);

/* Auto-terrain: each camo tile gets background-position to match satellite terrain at its location */
function buildTileGrid(camoOn) {
  let html = '<div class="tile-grid">';
  for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 10; c++) {
      const key = r + '-' + c;
      const isH = H_TILES.has(key);
      if (camoOn && isH) {
        /* Calculate background-position so tile shows the terrain at its position */
        const xPct = (35 + c / 9 * 30).toFixed(1);
        const yPct = (35 + r / 9 * 30).toFixed(1);
        html += '<div class="tile tile-camo" style="background-position:' + xPct + '% ' + yPct + '%" data-r="' + r + '" data-c="' + c + '"></div>';
      } else {
        html += '<div class="tile tile-clear" data-r="' + r + '" data-c="' + c + '"></div>';
      }
    }
  }
  html += '</div>';
  return html;
}

function buildSecPanel(camoOn) {
  const onClass = camoOn ? ' on' : '';
  const wrapClass = camoOn ? ' active' : '';
  const statusText = camoOn ? 'CAMO ACTIVE' : 'EXPOSED';
  const statusCls = camoOn ? 'sec-status-val' : 'sec-status-val alert';
  const switchTextCls = camoOn ? 'camo-switch-text on-text' : 'camo-switch-text off';
  const switchLabel = camoOn ? 'CAMO ON' : 'CAMO OFF';
  /* Auto-terrain scan result (shown when camo active) */
  const terrainStatus = camoOn ?
    '<div class="terrain-status">' +
      '<div class="scan-line"><span>🛰️ TERRAIN SCAN</span><span class="scan-val">COMPLETE</span></div>' +
      '<div class="scan-line"><span>DETECTED</span><span class="scan-val">FOREST 87%</span></div>' +
      '<div class="scan-line"><span>MATCH</span><span class="scan-val">20 TILES MASKED</span></div>' +
      '<div class="scan-line"><span>SOURCE</span><span class="scan-val">ESRI SAT AUTO</span></div>' +
    '</div>' : '';
  return '<div class="sec-panel">' +
    '<div class="sec-header">Security Control</div>' +
    '<div class="sec-status">' +
      '<div class="sec-status-line"><span>DEFCON</span><span class="sec-status-val">3 — ROUND HOUSE</span></div>' +
      '<div class="sec-status-line"><span>PERIMETER</span><span class="sec-status-val">SECURE</span></div>' +
      '<div class="sec-status-line"><span>HELIPAD</span><span class="' + statusCls + '">' + statusText + '</span></div>' +
      '<div class="sec-status-line"><span>GRID TILES</span><span class="sec-status-val">100 ACTIVE</span></div>' +
    '</div>' +
    '<div class="camo-toggle-wrap' + wrapClass + '">' +
      '<div class="camo-label"><span class="icon">🛡️</span> 1급 보안: 헬기장 은폐</div>' +
      '<div class="camo-switch" onclick="toggleCamo(this)">' +
        '<div class="camo-switch-track' + onClass + '"><div class="camo-switch-knob"></div></div>' +
        '<span class="' + switchTextCls + '">' + switchLabel + '</span>' +
      '</div>' +
      terrainStatus +
    '</div>' +
  '</div>';
}

const SAMPLE_HTML = `
<div class="sat-view">
  <div class="classif-banner">TOP SECRET // NOFORN // CAMP DAVID EYES ONLY</div>
  <div class="defcon-bar">

/* Global camo state for test pane */
window._camoOn = false;

function toggleCamo(switchEl) {

/* ========== VDOM CORE ========== */
function createVNode(type, props, ...children) {
  return { type, props: props || {}, children: children.flat() };
}
function createTextVNode(text) {
  return { type: '__TEXT__', props: {}, children: [], text: String(text) };
}
function domToVNode(node) {
  if (node.nodeType === 3) {
    const t = node.textContent;
    if (!t.trim()) return null;
    return createTextVNode(t);
  }
  if (node.nodeType !== 1) return null;
  const tag = node.tagName.toLowerCase();
  const props = {};
  for (const a of node.attributes) {
    if (a.name === 'contenteditable') continue;
    props[a.name] = a.value;
  }
  const ch = [];
  for (const c of node.childNodes) {
    const v = domToVNode(c);
    if (v) ch.push(v);
  }
  return { type: tag, props, children: ch };
}
function containerToVNodes(el) {
  const arr = [];
  for (const c of el.childNodes) {
    const v = domToVNode(c);
    if (v) arr.push(v);
  }
  return arr;
}
function renderVNode(vn) {
  if (!vn) return document.createTextNode('');
  if (vn.type === '__TEXT__') return document.createTextNode(vn.text || '');
  const el = document.createElement(vn.type);
  for (const [k, v] of Object.entries(vn.props || {})) el.setAttribute(k, v);
  for (const ch of vn.children || []) el.appendChild(renderVNode(ch));
  return el;
}
function renderToContainer(container, vnodes) {
  container.innerHTML = '';
  for (const v of vnodes) container.appendChild(renderVNode(v));
}
function cloneVNode(vn) {
  if (!vn) return vn;
  if (vn.type === '__TEXT__') return { type: '__TEXT__', props: {}, children: [], text: vn.text };
  return { type: vn.type, props: { ...vn.props }, children: (vn.children || []).map(c => cloneVNode(c)) };
}

/* ========== DIFF ALGORITHM ========== */
const CREATE = 'CREATE', REMOVE = 'REMOVE', REPLACE = 'REPLACE', UPDATE = 'UPDATE';

function diff(oldVN, newVN) {
  if (!oldVN) return { type: CREATE, newVNode: newVN };
  if (!newVN) return { type: REMOVE };
  if (oldVN.type === '__TEXT__' && newVN.type === '__TEXT__') {
    if (oldVN.text !== newVN.text) return { type: REPLACE, newVNode: newVN };
    return null;
  }
  if (oldVN.type !== newVN.type) return { type: REPLACE, newVNode: newVN };
  const propPatches = diffProps(oldVN.props, newVN.props);
  const childPatches = diffChildren(oldVN.children || [], newVN.children || []);
  if (propPatches.length === 0 && childPatches.length === 0) return null;
  return { type: UPDATE, propPatches, childPatches };
}
function diffProps(oldP, newP) {
  const patches = [];
  const all = new Set([...Object.keys(oldP || {}), ...Object.keys(newP || {})]);
  for (const k of all) {
    const o = (oldP || {})[k], n = (newP || {})[k];
    if (o !== n) patches.push({ key: k, oldVal: o, newVal: n });
  }
  return patches;
}
function diffChildren(oldCh, newCh) {
  const patches = [];
  const len = Math.max(oldCh.length, newCh.length);
  for (let i = 0; i < len; i++) patches.push(diff(oldCh[i], newCh[i]));
  return patches;
}

/* ========== PATCH ========== */
function realChildren(parent) {
  return Array.from(parent.childNodes).filter(n => {
    if (n.nodeType === 3 && !n.textContent.trim()) return false;
    if (n.nodeType === 1 && n.classList && n.classList.contains('el-selected-marker')) return false;
    return true;
  });
}
function applyPatch(parent, patch, index) {
  if (!patch) return;
  const kids = realChildren(parent);
  const node = kids[index];
  switch (patch.type) {
    case CREATE: { const el = renderVNode(patch.newVNode); parent.appendChild(el); break; }
    case REMOVE: if (node) parent.removeChild(node); break;
    case REPLACE: { const el = renderVNode(patch.newVNode); if (node) parent.replaceChild(el, node); else parent.appendChild(el); break; }
    case UPDATE: {
      if (!node || node.nodeType !== 1) break;
      for (const pp of patch.propPatches) {
        if (pp.newVal === undefined) node.removeAttribute(pp.key);
        else node.setAttribute(pp.key, pp.newVal);
      }
      applyChildPatches(node, patch.childPatches);
      break;
    }
  }
}
function applyChildPatches(parent, childPatches) {
  if (!childPatches) return;
  for (let i = 0; i < childPatches.length; i++) applyPatch(parent, childPatches[i], i);
}

/* ========== HISTORY ========== */
const stateHistory = {
  stack: [], idx: -1,
  push(s) { this.stack.splice(this.idx + 1); this.stack.push(s.map(v => cloneVNode(v))); this.idx = this.stack.length - 1; },
  undo() { if (this.canUndo()) this.idx--; return this.stack[this.idx].map(v => cloneVNode(v)); },
  redo() { if (this.canRedo()) this.idx++; return this.stack[this.idx].map(v => cloneVNode(v)); },
  canUndo() { return this.idx > 0; },
  canRedo() { return this.idx < this.stack.length - 1; },
  info() { return (this.idx + 1) + ' / ' + this.stack.length; }
};

/* ========== LOG ========== */
const logEl = document.getElementById('diff-log');
let allLogs = 0;
function patchToLogs(patches, path) {
  const lines = [];
  if (!patches) return lines;
  (Array.isArray(patches) ? patches : [patches]).forEach((p, i) => {
    if (!p) return;
    const pp = path ? path + '[' + i + ']' : 'root[' + i + ']';
    switch (p.type) {
      case CREATE: lines.push({ cls: 'create', msg: '+ CREATE ' + pp + ' &lt;' + (p.newVNode ? p.newVNode.type : '?') + '&gt;' }); break;
      case REMOVE: lines.push({ cls: 'remove', msg: '- REMOVE ' + pp }); break;
      case REPLACE: lines.push({ cls: 'replace', msg: '~ REPLACE ' + pp + ' → &lt;' + (p.newVNode ? p.newVNode.type : '?') + '&gt;' }); break;
      case UPDATE:
        if (p.propPatches) p.propPatches.forEach(pp2 => {
          lines.push({ cls: 'update', msg: '✱ SET PROP ' + pp + '  [' + pp2.key + '] ' + (pp2.oldVal || '∅') + ' → ' + (pp2.newVal || '∅') });
        });
        if (p.childPatches) lines.push(...patchToLogs(p.childPatches, pp));
        break;
    }
  });
  return lines;
}
function addLog(cls, msg) {
  allLogs++;
  const t = new Date().toLocaleTimeString('en', { hour12: false });
  const d = document.createElement('div');
  d.className = 'log-entry log-' + cls;
  d.innerHTML = '<span class="log-time">' + t + '</span>' + msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

/* ========== UI STATE ========== */
let selectedEl = null;
function updateUI() {
  document.getElementById('btn-undo').disabled = !stateHistory.canUndo();
  document.getElementById('btn-redo').disabled = !stateHistory.canRedo();
  document.getElementById('history-indicator').textContent = stateHistory.info();
}
function selectElement(el) {
  if (selectedEl) selectedEl.classList.remove('el-selected');
  selectedEl = el;
  if (el) el.classList.add('el-selected');
}

/* ========== TOOLS ========== */
function toolMoveUp() { if (!selectedEl || !selectedEl.previousElementSibling) return; selectedEl.parentNode.insertBefore(selectedEl, selectedEl.previousElementSibling); }
function toolMoveDown() { if (!selectedEl || !selectedEl.nextElementSibling) return; selectedEl.parentNode.insertBefore(selectedEl.nextElementSibling, selectedEl); }
function toolEditAttrs() {
  if (!selectedEl) return;
  const list = document.getElementById('attr-list'); list.innerHTML = '';
  for (const a of selectedEl.attributes) { if (a.name === 'contenteditable' || a.name === 'class' && a.value === 'el-selected') continue; addAttrRow(a.name, a.value); }
  if (list.children.length === 0) addAttrRow('', '');
  document.getElementById('attr-modal').classList.add('show');
}
function addAttrRow(name, value) {
  const list = document.getElementById('attr-list');
  const row = document.createElement('div'); row.className = 'modal-row';
  row.innerHTML = '<input placeholder="name" value="' + (name||'').replace(/"/g,'&quot;') + '"><input placeholder="value" value="' + (value||'').replace(/"/g,'&quot;') + '"><button class="del-attr" onclick="this.parentNode.remove()">✕</button>';
  list.appendChild(row);
}
function saveAttrs() {
  if (!selectedEl) return;
  const keep = [];
  for (const a of [...selectedEl.attributes]) { if (a.name === 'contenteditable') continue; keep.push(a.name); }
  keep.forEach(n => selectedEl.removeAttribute(n));
  document.querySelectorAll('#attr-list .modal-row').forEach(r => {
    const inputs = r.querySelectorAll('input');
    const n = inputs[0].value.trim(), v = inputs[1].value;
    if (n && n !== 'contenteditable') selectedEl.setAttribute(n, v);
  });
  if (selectedEl.classList.length === 0) selectedEl.removeAttribute('class');
  closeAttrModal();
}
function closeAttrModal() { document.getElementById('attr-modal').classList.remove('show'); }
function toolChangeTag() {
  if (!selectedEl) return;
  document.getElementById('current-tag-display').textContent = selectedEl.tagName.toLowerCase();
  document.getElementById('tag-select').value = selectedEl.tagName.toLowerCase();
  document.getElementById('tag-modal').classList.add('show');
}
function saveTagChange() {
  if (!selectedEl) return;
  const newTag = document.getElementById('tag-select').value;
  if (newTag === selectedEl.tagName.toLowerCase()) { closeTagModal(); return; }
  const newEl = document.createElement(newTag);
  for (const a of selectedEl.attributes) newEl.setAttribute(a.name, a.value);
  while (selectedEl.firstChild) newEl.appendChild(selectedEl.firstChild);
  selectedEl.parentNode.replaceChild(newEl, selectedEl);
  selectElement(newEl); closeTagModal();
}
function closeTagModal() { document.getElementById('tag-modal').classList.remove('show'); }
function toolDuplicate() { if (!selectedEl) return; const c = selectedEl.cloneNode(true); c.classList.remove('el-selected'); selectedEl.parentNode.insertBefore(c, selectedEl.nextSibling); }
function toolAddChild() { if (!selectedEl) return; const c = document.createElement('div'); c.textContent = 'new child'; c.style.cssText = 'padding:4px 8px;background:rgba(66,133,244,.08);border-radius:4px;font-size:.7rem;color:var(--accent)'; selectedEl.appendChild(c); }
function toolAddSibling() { if (!selectedEl) return; const s = document.createElement('div'); s.textContent = 'new sibling'; s.style.cssText = 'padding:4px 8px;background:rgba(251,188,4,.08);border-radius:4px;font-size:.7rem;color:var(--yellow)'; selectedEl.parentNode.insertBefore(s, selectedEl.nextSibling); }
function toolWrapEl() { if (!selectedEl) return; const w = document.createElement('div'); w.style.cssText = 'border:1px dashed rgba(66,133,244,.3);padding:6px;border-radius:4px'; selectedEl.parentNode.insertBefore(w, selectedEl); w.appendChild(selectedEl); selectElement(w); }
function toolDelete() { if (!selectedEl) return; selectedEl.parentNode.removeChild(selectedEl); selectedEl = null; }

/* ========== HANDLERS ========== */
function handlePatch() {
  const actual = document.getElementById('actual-area');
  const test = document.getElementById('test-area');
  const oldVN = containerToVNodes(actual);
  const newVN = containerToVNodes(test);
  const len = Math.max(oldVN.length, newVN.length);
  const patches = [];
  for (let i = 0; i < len; i++) patches.push(diff(oldVN[i], newVN[i]));
  const logs = patchToLogs(patches, '');
  if (logs.length === 0) { addLog('info', 'No changes detected'); return; }
  addLog('divider', '─── PATCH ───');
  logs.forEach(l => addLog(l.cls, l.msg));
  for (let i = 0; i < patches.length; i++) applyPatch(actual, patches[i], i);
  stateHistory.push(containerToVNodes(test));
  updateUI();
  addLog('info', 'Patch applied: ' + logs.length + ' minimal change(s) out of 100+ DOM nodes');
}
function handleUndo() {
  if (!stateHistory.canUndo()) return;
  const vnodes = stateHistory.undo();
  renderToContainer(document.getElementById('actual-area'), vnodes);
  renderToContainer(document.getElementById('test-area'), vnodes.map(v => cloneVNode(v)));
  window._camoOn = false;
  updateUI(); addLog('info', '↩ Undo → state ' + stateHistory.info()); selectElement(null);
}
function handleRedo() {
  if (!stateHistory.canRedo()) return;
  const vnodes = stateHistory.redo();
  renderToContainer(document.getElementById('actual-area'), vnodes);
  renderToContainer(document.getElementById('test-area'), vnodes.map(v => cloneVNode(v)));
  updateUI(); addLog('info', '↪ Redo → state ' + stateHistory.info()); selectElement(null);
}

/* ========== INIT ========== */
(function init() {
  const actual = document.getElementById('actual-area');
  const test = document.getElementById('test-area');
  actual.innerHTML = SAMPLE_HTML;
  test.innerHTML = SAMPLE_HTML;
  /* Satellite image loaded via CSS from ESRI ArcGIS — no manual injection needed */
  stateHistory.push(containerToVNodes(actual));
  updateUI();
  test.addEventListener('click', function(e) {
    if (e.target === test) return;
    e.preventDefault(); e.stopPropagation();
    let target = e.target;
    if (target.nodeType === 3) target = target.parentNode;
    selectElement(target);
  });
  document.getElementById('btn-patch').addEventListener('click', handlePatch);
  document.getElementById('btn-undo').addEventListener('click', handleUndo);
  document.getElementById('btn-redo').addEventListener('click', handleRedo);
  document.getElementById('btn-clear').addEventListener('click', function() { logEl.innerHTML = ''; allLogs = 0; addLog('info', 'Log cleared'); });
  addLog('info', 'Camp David Perimeter Defense — V-DOM initialized');
  addLog('info', '🛰️ ESRI Satellite imagery loaded — auto-terrain ready');
  addLog('info', '🛡️ Toggle CAMO in right pane → Patch → see minimal diff (20 of 100 tiles)');
})();
