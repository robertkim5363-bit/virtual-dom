<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual DOM & Diff Algorithm</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Virtual DOM & Diff Algorithm</h1>
    <p>React의 핵심 개념을 Vanilla JS로 구현</p>
  </header>

  <div class="controls">
    <button id="btn-undo" class="btn" disabled>&#9664; 뒤로가기</button>
    <button id="btn-patch" class="btn btn-patch">&#9654; Patch</button>
    <button id="btn-redo" class="btn" disabled>앞으로가기 &#9654;</button>
    <span id="history-indicator">State: 1 / 1</span>
  </div>

  <main class="main">
    <!-- 실제 영역 -->
    <section class="panel">
      <div class="panel-head">
        <h2>실제 영역 <span class="badge">Read-Only</span></h2>
        <small>Diff 결과가 patch되는 실제 DOM</small>
      </div>
      <div id="actual-area" class="panel-body"></div>
    </section>

    <!-- 테스트 영역 -->
    <section class="panel">
      <div class="panel-head">
        <h2>테스트 영역 <span class="badge badge-edit">HTML Source</span></h2>
        <small>HTML을 자유롭게 수정 (태그, 속성, 순서 등)</small>
      </div>
      <div id="test-area" class="panel-body">
        <div class="preview-toggle">
          <button id="btn-mode-code" class="btn active" onclick="setMode('code')">Code</button>
          <button id="btn-mode-preview" class="btn" onclick="setMode('preview')">Preview</button>
        </div>
        <textarea id="test-editor" spellcheck="false"></textarea>
        <div id="test-preview" style="display:none"></div>
      </div>
    </section>
  </main>

  <!-- Diff Log -->
  <section class="log-section">
    <div class="log-head">
      <h2>Diff Log</h2>
      <button id="btn-clear" class="btn btn-small">Clear</button>
    </div>
    <div id="diff-log"></div>
  </section>

  <script src="js/vdom.js"></script>
  <script src="js/diff.js"></script>
  <script src="js/patch.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
