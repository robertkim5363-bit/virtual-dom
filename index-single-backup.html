<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual DOM & Diff — Google Earth Explorer</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2332;--border:#2a3a50;
  --text:#e4e8f0;--text2:#8b9ab8;--muted:#5c6a80;
  --accent:#4285f4;--green:#34a853;--red:#ea4335;--yellow:#fbbc04;--blue:#4fc3f7;--earth-dark:#0d1b2a;
  --radius:10px;--mono:'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:0 20px 40px}
header{text-align:center;padding:28px 0 12px}
header h1{font-size:1.7rem;background:linear-gradient(135deg,#4285f4,#34a853,#fbbc04,#ea4335);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text2);font-size:.88rem;margin-top:4px}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;user-select:none}
.btn:hover:not(:disabled){background:#1e2d3d;border-color:#4a6280}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-patch{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;padding:10px 32px;box-shadow:0 0 20px #4285f440}
.btn-patch:hover:not(:disabled){background:#3367d6}
.btn-small{padding:4px 12px;font-size:.75rem}
#history-indicator{font-family:var(--mono);font-size:.8rem;color:var(--muted);background:var(--bg2);padding:6px 14px;border-radius:6px;border:1px solid var(--border)}
.main{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1400px;margin:0 auto}
@media(max-width:860px){.main{grid-template-columns:1fr}}
.panel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.panel-head{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.panel-head h2{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:10px}
.panel-head small{font-size:.78rem;color:var(--muted)}
.badge{font-size:.65rem;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.badge-edit{background:rgba(66,133,244,.15);color:var(--accent);border-color:rgba(66,133,244,.3)}
.panel-body{padding:0;min-height:400px;max-height:600px;overflow-y:auto;position:relative}
.panel-body::-webkit-scrollbar{width:6px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* 편집 도구 모음 */
.edit-toolbar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);background:rgba(66,133,244,.04)}
.tool-btn{padding:5px 10px;font-size:.7rem;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tool-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-btn.danger:hover{background:var(--red);border-color:var(--red)}
/* 선택된 요소 하이라이트 */
.el-selected{outline:2px solid var(--accent)!important;outline-offset:2px;position:relative}
.el-selected::after{content:'✎';position:absolute;top:-10px;right:-10px;background:var(--accent);color:#fff;font-size:.6rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
/* 속성 편집 모달 */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:24px;min-width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h3{font-size:1rem;margin-bottom:16px;color:var(--accent)}
.modal-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.modal-row input{flex:1;padding:6px 10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:.82rem;font-family:var(--mono)}
.modal-row input:focus{outline:none;border-color:var(--accent)}
.modal-row .del-attr{padding:4px 8px;background:var(--red);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.7rem}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal-btns .btn{padding:7px 18px;font-size:.8rem}
.modal-btns .btn-save{background:var(--accent);border-color:var(--accent);color:#fff}
/* 태그 변경 셀렉트 */
.tag-select{padding:4px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:.75rem;font-family:var(--mono)}
/* contenteditable 영역 */
#test-area{outline:none;cursor:default}
#test-area:focus{box-shadow:inset 0 0 0 2px rgba(66,133,244,.1)}
/* 로그 */
.log-section{max-width:1400px;margin:20px auto 0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.log-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
.log-head h2{font-size:.9rem;font-weight:600}
#diff-log{padding:12px 20px;max-height:220px;overflow-y:auto;font-family:var(--mono);font-size:.78rem;line-height:1.8}
.log-entry{padding:2px 0;border-left:3px solid transparent;padding-left:10px;margin-bottom:2px}
.log-time{color:var(--muted);margin-right:6px}
.log-info{border-left-color:var(--blue);color:var(--text2)}
.log-create{border-left-color:var(--green);color:var(--green)}
.log-remove{border-left-color:var(--red);color:var(--red)}
.log-replace{border-left-color:var(--yellow);color:var(--yellow)}
.log-update{border-left-color:var(--blue);color:var(--blue)}
.log-divider{color:var(--muted);text-align:center;border-left-color:transparent;padding:4px 0;font-weight:600;letter-spacing:.1em}

/* ═══════════════════════════════════════════════════════
   GOOGLE EARTH STYLE COMPONENTS
   ═══════════════════════════════════════════════════════ */

/* 맵 컨테이너 */
.ge-map{
  position:relative;width:100%;min-height:400px;
  background:
    radial-gradient(ellipse at 35% 40%, #0a4a3a 0%, transparent 35%),
    radial-gradient(ellipse at 55% 55%, #0d3d2d 0%, transparent 30%),
    radial-gradient(ellipse at 70% 30%, #083448 0%, transparent 40%),
    radial-gradient(ellipse at 25% 70%, #0b4858 0%, transparent 45%),
    radial-gradient(ellipse at 60% 75%, #094050 0%, transparent 35%),
    radial-gradient(ellipse at 50% 50%, #062a3e 0%, #041e30 100%);
  overflow:hidden;padding:16px;
}

/* 위성 이미지 느낌의 그리드 오버레이 */
.ge-map::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:1;
}

/* 검색 바 */
.ge-search{
  display:flex;align-items:center;gap:8px;
  background:rgba(32,43,60,.92);backdrop-filter:blur(8px);
  padding:8px 14px;border-radius:24px;border:1px solid rgba(255,255,255,.1);
  margin-bottom:14px;position:relative;z-index:2;max-width:360px;
}
.ge-search-icon{font-size:.9rem;color:var(--text2)}
.ge-search-text{font-size:.82rem;color:var(--text2);flex:1}
.ge-search-voice{font-size:.75rem;color:var(--accent);cursor:pointer}

/* 사이드 패널 */
.ge-sidebar{
  position:absolute;top:16px;right:16px;width:220px;z-index:2;
  display:flex;flex-direction:column;gap:8px;
}
.ge-sidebar-card{
  background:rgba(17,24,39,.9);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;
  padding:12px;
}
.ge-sidebar-card h4{font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ge-sidebar-card p{font-size:.72rem;color:var(--text2);line-height:1.5}

/* 레이어 컨트롤 */
.ge-layers{display:flex;flex-direction:column;gap:4px}
.ge-layer-item{
  display:flex;align-items:center;gap:8px;
  padding:4px 0;font-size:.72rem;color:var(--text2);
}
.ge-layer-toggle{
  width:28px;height:16px;border-radius:8px;position:relative;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
}
.ge-layer-toggle.on{background:var(--accent);border-color:var(--accent)}
.ge-layer-toggle.off{background:rgba(255,255,255,.1)}
.ge-layer-toggle::after{
  content:'';position:absolute;top:2px;width:10px;height:10px;border-radius:50%;
  background:#fff;transition:left .15s;
}
.ge-layer-toggle.on::after{left:14px}
.ge-layer-toggle.off::after{left:2px}

/* 지도 위 마커 / 핀 */
.ge-marker{
  position:absolute;z-index:3;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:transform .15s;
}
.ge-marker:hover{transform:scale(1.1)}
.ge-pin{
  width:28px;height:28px;border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.ge-pin-inner{transform:rotate(45deg);font-size:.65rem;font-weight:700;color:#fff}
.ge-pin-red{background:var(--red)}
.ge-pin-blue{background:var(--accent)}
.ge-pin-green{background:var(--green)}
.ge-pin-yellow{background:var(--yellow)}
.ge-marker-label{
  margin-top:4px;padding:2px 6px;border-radius:3px;
  background:rgba(0,0,0,.7);color:#fff;font-size:.65rem;font-weight:500;
  white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.8);
}

/* 네비게이션 컨트롤 */
.ge-nav{
  position:absolute;bottom:16px;right:16px;z-index:2;
  display:flex;flex-direction:column;gap:4px;
}
.ge-nav-btn{
  width:32px;height:32px;border-radius:6px;
  background:rgba(17,24,39,.9);border:1px solid rgba(255,255,255,.1);
  color:var(--text);font-size:.8rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.ge-nav-btn:hover{background:rgba(66,133,244,.3);border-color:var(--accent)}

/* 좌표 표시 바 */
.ge-coords{
  position:absolute;bottom:16px;left:16px;z-index:2;
  background:rgba(17,24,39,.85);padding:6px 12px;border-radius:6px;
  border:1px solid rgba(255,255,255,.08);
  font-family:var(--mono);font-size:.68rem;color:var(--text2);
  display:flex;gap:14px;
}
.ge-coords span{display:flex;align-items:center;gap:4px}
.ge-coord-label{color:var(--accent);font-weight:600}

/* 정보 패널 (팝업) */
.ge-info-panel{
  background:rgba(17,24,39,.95);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:14px;margin-top:8px;position:relative;z-index:2;
  max-width:340px;
}
.ge-info-panel h3{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:4px}
.ge-info-panel .ge-info-type{font-size:.68rem;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.ge-info-panel p{font-size:.76rem;color:var(--text2);line-height:1.6;margin-bottom:8px}
.ge-info-tags{display:flex;gap:4px;flex-wrap:wrap}
.ge-info-tag{
  font-size:.62rem;padding:2px 8px;border-radius:12px;
  background:rgba(66,133,244,.12);color:var(--accent);
  border:1px solid rgba(66,133,244,.2);
}
.ge-info-tag.tag-green{background:rgba(52,168,83,.12);color:var(--green);border-color:rgba(52,168,83,.2)}
.ge-info-tag.tag-yellow{background:rgba(251,188,4,.12);color:var(--yellow);border-color:rgba(251,188,4,.2)}
.ge-info-tag.tag-red{background:rgba(234,67,53,.12);color:var(--red);border-color:rgba(234,67,53,.2)}

/* 스트리트뷰 썸네일 */
.ge-streetview{
  width:100%;height:60px;border-radius:6px;margin-top:8px;
  background:linear-gradient(135deg,#1a2a3a 0%,#2a3a4a 50%,#1a2530 100%);
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.08);
  font-size:.68rem;color:var(--muted);cursor:pointer;
}
.ge-streetview:hover{border-color:var(--accent);color:var(--accent)}

/* 스케일 바 */
.ge-scale{
  position:absolute;bottom:44px;left:16px;z-index:2;
  display:flex;align-items:flex-end;gap:2px;
}
.ge-scale-bar{width:60px;height:3px;background:rgba(255,255,255,.5);border-radius:1px;position:relative}
.ge-scale-bar::before,.ge-scale-bar::after{content:'';position:absolute;bottom:0;width:1px;height:8px;background:rgba(255,255,255,.5)}
.ge-scale-bar::before{left:0}
.ge-scale-bar::after{right:0}
.ge-scale-text{font-size:.58rem;color:rgba(255,255,255,.5);margin-left:4px}

/* 구글 어스 로고 */
.ge-logo{
  position:absolute;top:60px;left:16px;z-index:2;
  font-size:.7rem;font-weight:600;
  background:linear-gradient(135deg,#4285f4,#34a853,#fbbc04,#ea4335);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:.02em;
}

/* 날씨 위젯 */
.ge-weather{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-top:1px solid rgba(255,255,255,.06);margin-top:8px;
}
.ge-weather-icon{font-size:1.2rem}
.ge-weather-temp{font-size:.9rem;font-weight:600;color:var(--text)}
.ge-weather-desc{font-size:.68rem;color:var(--text2)}

/* 타임라인 바 */
.ge-timeline{
  display:flex;align-items:center;gap:6px;padding:6px 0;
  border-top:1px solid rgba(255,255,255,.06);margin-top:6px;
}
.ge-timeline-dot{width:6px;height:6px;border-radius:50%}
.ge-timeline-dot.past{background:var(--muted)}
.ge-timeline-dot.current{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.ge-timeline-label{font-size:.62rem;color:var(--muted)}

</style>
</head>
<body>

<header>
  <h1>Virtual DOM & Diff Algorithm — Google Earth Explorer</h1>
  <p>가상 DOM으로 Google Earth급 복잡한 UI의 변경 사항을 효율적으로 관리</p>
</header>

<div class="controls">
  <button id="btn-undo" class="btn" disabled>&#9664; 뒤로가기</button>
  <button id="btn-patch" class="btn btn-patch">&#9654; Patch</button>
  <button id="btn-redo" class="btn" disabled>앞으로가기 &#9654;</button>
  <span id="history-indicator">State: 1 / 1</span>
</div>

<main class="main">
  <!-- 실제 영역 -->
  <section class="panel">
    <div class="panel-head">
      <h2>실제 영역 <span class="badge">Read-Only</span></h2>
      <small>Diff 결과가 patch되는 실제 DOM</small>
    </div>
    <div id="actual-area" class="panel-body"></div>
  </section>

  <!-- 테스트 영역 -->
  <section class="panel">
    <div class="panel-head">
      <h2>테스트 영역 <span class="badge badge-edit">Editable</span></h2>
      <small>요소 클릭 후 도구를 사용하여 수정</small>
    </div>
    <div class="edit-toolbar" id="edit-toolbar">
      <button class="tool-btn" onclick="toolMoveUp()" title="선택 요소를 위로 이동">▲ 위로</button>
      <button class="tool-btn" onclick="toolMoveDown()" title="선택 요소를 아래로 이동">▼ 아래로</button>
      <button class="tool-btn" onclick="toolEditAttrs()" title="선택 요소의 속성 편집">⚙ 속성</button>
      <button class="tool-btn" onclick="toolChangeTag()" title="선택 요소의 태그 변경">⟨⟩ 태그</button>
      <button class="tool-btn" onclick="toolDuplicate()" title="선택 요소 복제">⧉ 복제</button>
      <button class="tool-btn" onclick="toolAddChild()" title="선택 요소 안에 자식 추가">+ 자식</button>
      <button class="tool-btn" onclick="toolAddSibling()" title="선택 요소 뒤에 형제 추가">+ 형제</button>
      <button class="tool-btn" onclick="toolWrapEl()" title="선택 요소를 div로 감싸기">⊞ 감싸기</button>
      <button class="tool-btn danger" onclick="toolDelete()" title="선택 요소 삭제">✕ 삭제</button>
    </div>
    <div id="test-area" class="panel-body" contenteditable="true"></div>
  </section>
</main>

<!-- 속성 편집 모달 -->
<div class="modal-overlay" id="attr-modal">
  <div class="modal">
    <h3>속성 편집</h3>
    <div id="attr-list"></div>
    <button class="tool-btn" onclick="addAttrRow('','')" style="margin-top:8px">+ 속성 추가</button>
    <div class="modal-btns">
      <button class="btn" onclick="closeAttrModal()">취소</button>
      <button class="btn btn-save" onclick="saveAttrs()">저장</button>
    </div>
  </div>
</div>

<!-- 태그 변경 모달 -->
<div class="modal-overlay" id="tag-modal">
  <div class="modal">
    <h3>태그 변경</h3>
    <p style="font-size:.82rem;color:var(--text2);margin-bottom:12px">현재 태그: <strong id="current-tag-display" style="color:var(--accent)"></strong></p>
    <select id="tag-select" class="tag-select" style="width:100%;padding:8px">
      <option value="div">div</option>
      <option value="span">span</option>
      <option value="p">p</option>
      <option value="h1">h1</option>
      <option value="h2">h2</option>
      <option value="h3">h3</option>
      <option value="h4">h4</option>
      <option value="section">section</option>
      <option value="article">article</option>
      <option value="ul">ul</option>
      <option value="ol">ol</option>
      <option value="li">li</option>
      <option value="strong">strong</option>
      <option value="em">em</option>
      <option value="a">a</option>
      <option value="button">button</option>
      <option value="header">header</option>
      <option value="footer">footer</option>
      <option value="nav">nav</option>
    </select>
    <div class="modal-btns">
      <button class="btn" onclick="closeTagModal()">취소</button>
      <button class="btn btn-save" onclick="saveTagChange()">변경</button>
    </div>
  </div>
</div>

<section class="log-section">
  <div class="log-head">
    <h2>Diff Log</h2>
    <button id="btn-clear" class="btn btn-small">Clear</button>
  </div>
  <div id="diff-log"></div>
</section>

<script>
// ═══════════════════════════════════════════════════════════════
// SAMPLE HTML — Google Earth Explorer UI
// ═══════════════════════════════════════════════════════════════
var SAMPLE_HTML = [
'<div class="ge-map">',

  // 구글 어스 로고
  '<div class="ge-logo">Google Earth</div>',

  // 검색 바
  '<div class="ge-search">',
    '<span class="ge-search-icon">&#128269;</span>',
    '<span class="ge-search-text">Dorado, Puerto Rico 탐색 중...</span>',
    '<span class="ge-search-voice">&#127908;</span>',
  '</div>',

  // 마커 1 - 리츠칼튼 리조트
  '<div class="ge-marker" style="top:80px;left:60px">',
    '<div class="ge-pin ge-pin-red"><span class="ge-pin-inner">1</span></div>',
    '<span class="ge-marker-label">The Ritz-Carlton Reserve</span>',
  '</div>',

  // 마커 2 - Encanto Beach
  '<div class="ge-marker" style="top:170px;left:200px">',
    '<div class="ge-pin ge-pin-blue"><span class="ge-pin-inner">2</span></div>',
    '<span class="ge-marker-label">Encanto Beach</span>',
  '</div>',

  // 마커 3 - Plantation Village

// ═══════════════════════════════════════════════════════════════
// 1. VIRTUAL DOM CORE
// ═══════════════════════════════════════════════════════════════

function createVNode(type, props, children) {
  return { type: type, props: props || {}, children: children || [] };
}
function createTextVNode(value) {
  return { type: 'TEXT_NODE', props: {}, children: [], value: value };
}
function domToVNode(node) {
  if (node.nodeType === Node.TEXT_NODE) {
    if (node.textContent.trim() === '') return null;
    return createTextVNode(node.textContent);
  }
  if (node.nodeType !== Node.ELEMENT_NODE) return null;
  var props = {};
  for (var i = 0; i < node.attributes.length; i++) {
    props[node.attributes[i].name] = node.attributes[i].value;
  }
  var children = [];
  for (var j = 0; j < node.childNodes.length; j++) {
    var v = domToVNode(node.childNodes[j]);
    if (v) children.push(v);
  }
  return createVNode(node.tagName.toLowerCase(), props, children);
}
function containerToVNodes(el) {
  var result = [];
  for (var i = 0; i < el.childNodes.length; i++) {
    var v = domToVNode(el.childNodes[i]);
    if (v) result.push(v);
  }
  return result;
}
function renderVNode(vnode) {
  if (vnode.type === 'TEXT_NODE') return document.createTextNode(vnode.value);
  var el = document.createElement(vnode.type);
  var keys = Object.keys(vnode.props);
  for (var i = 0; i < keys.length; i++) el.setAttribute(keys[i], vnode.props[keys[i]]);
  for (var j = 0; j < vnode.children.length; j++) el.appendChild(renderVNode(vnode.children[j]));
  return el;
}
function renderToContainer(vnodes, container) {
  container.innerHTML = '';
  for (var i = 0; i < vnodes.length; i++) container.appendChild(renderVNode(vnodes[i]));
}
function cloneVNode(vnode) {
  if (Array.isArray(vnode)) return vnode.map(cloneVNode);
  if (vnode.type === 'TEXT_NODE') return createTextVNode(vnode.value);
  return createVNode(vnode.type, JSON.parse(JSON.stringify(vnode.props)), vnode.children.map(cloneVNode));
}

// ═══════════════════════════════════════════════════════════════
// 2. DIFF ALGORITHM — 5가지 핵심 케이스
// ═══════════════════════════════════════════════════════════════

var CREATE = 'CREATE', REMOVE = 'REMOVE', REPLACE = 'REPLACE', UPDATE = 'UPDATE';

function diff(oldV, newV) {
  if (!oldV && newV) return { type: CREATE, newVNode: newV };
  if (oldV && !newV) return { type: REMOVE };
  if (!oldV && !newV) return null;
  if (oldV.type !== newV.type) return { type: REPLACE, newVNode: newV };
  if (oldV.type === 'TEXT_NODE') {
    return oldV.value !== newV.value ? { type: REPLACE, newVNode: newV } : null;
  }
  var propPatches = diffProps(oldV.props, newV.props);
  var childPatches = diffChildren(oldV.children, newV.children);
  if (!propPatches.length && !childPatches.length) return null;
  return { type: UPDATE, propPatches: propPatches, childPatches: childPatches };
}
function diffProps(oldP, newP) {
  var patches = [];
  var newKeys = Object.keys(newP);
  for (var i = 0; i < newKeys.length; i++) {
    if (oldP[newKeys[i]] !== newP[newKeys[i]]) patches.push({ action: 'SET', key: newKeys[i], value: newP[newKeys[i]] });
  }
  var oldKeys = Object.keys(oldP);
  for (var j = 0; j < oldKeys.length; j++) {
    if (!(oldKeys[j] in newP)) patches.push({ action: 'REMOVE', key: oldKeys[j] });
  }
  return patches;
}
function diffChildren(oldC, newC) {
  var patches = [];
  var max = Math.max(oldC.length, newC.length);
  for (var i = 0; i < max; i++) {
    var p = diff(i < oldC.length ? oldC[i] : null, i < newC.length ? newC[i] : null);
    if (p) patches.push({ index: i, patch: p });
  }
  return patches;
}

// ═══════════════════════════════════════════════════════════════
// 3. PATCH SYSTEM
// ═══════════════════════════════════════════════════════════════

function realChildren(parent) {
  var result = [];
  for (var i = 0; i < parent.childNodes.length; i++) {
    var c = parent.childNodes[i];
    if (c.nodeType === Node.TEXT_NODE && c.textContent.trim() === '') continue;
    result.push(c);
  }
  return result;
}
function applyPatch(parent, node, patch) {
  switch (patch.type) {
    case CREATE:
      parent.appendChild(renderVNode(patch.newVNode)); break;
    case REMOVE:
      if (node && node.parentNode) node.parentNode.removeChild(node); break;
    case REPLACE:
      var newEl = renderVNode(patch.newVNode);
      if (node && node.parentNode) node.parentNode.replaceChild(newEl, node);
      else parent.appendChild(newEl);
      break;
    case UPDATE:
      if (patch.propPatches) {
        for (var i = 0; i < patch.propPatches.length; i++) {
          var pp = patch.propPatches[i];
          if (pp.action === 'SET') { node.setAttribute(pp.key, pp.value); if (pp.key === 'style') node.style.cssText = pp.value; }
          else node.removeAttribute(pp.key);
        }
      }
      if (patch.childPatches && patch.childPatches.length > 0) applyChildPatches(node, patch.childPatches);
      break;
  }
}
function applyChildPatches(parent, childPatches) {
  var sorted = childPatches.slice().sort(function(a, b) { return b.index - a.index; });
  for (var i = 0; i < sorted.length; i++) {
    if (sorted[i].patch.type === REMOVE) {
      var kids = realChildren(parent);
      if (kids[sorted[i].index]) parent.removeChild(kids[sorted[i].index]);
    }
  }
  var others = childPatches.filter(function(cp) { return cp.patch.type !== REMOVE; });
  others.sort(function(a, b) { return a.index - b.index; });
  for (var j = 0; j < others.length; j++) {
    var cp = others[j];
    var children = realChildren(parent);
    if (cp.patch.type === CREATE) {
      var newNode = renderVNode(cp.patch.newVNode);
      if (cp.index >= children.length) parent.appendChild(newNode);
      else parent.insertBefore(newNode, children[cp.index]);
    } else {
      if (children[cp.index]) applyPatch(parent, children[cp.index], cp.patch);
    }
  }
}
function patchContainer(container, patches) { applyChildPatches(container, patches); }

// ═══════════════════════════════════════════════════════════════
// 4. STATE HISTORY — Undo/Redo
// ═══════════════════════════════════════════════════════════════

var stateHistory = {
  states: [], idx: -1,
  push: function(v) { this.states = this.states.slice(0, this.idx + 1); this.states.push(cloneVNode(v)); this.idx = this.states.length - 1; },
  undo: function() { if (this.idx <= 0) return null; this.idx--; return cloneVNode(this.states[this.idx]); },
  redo: function() { if (this.idx >= this.states.length - 1) return null; this.idx++; return cloneVNode(this.states[this.idx]); },
  canUndo: function() { return this.idx > 0; },
  canRedo: function() { return this.idx < this.states.length - 1; },
  info: function() { return { cur: this.idx + 1, total: this.states.length }; }
};

// ═══════════════════════════════════════════════════════════════
// 5. DIFF LOG
// ═══════════════════════════════════════════════════════════════

function patchToLogs(patch, path) {
  var logs = [];
  if (patch.type === CREATE) {
    var tag = patch.newVNode.type === 'TEXT_NODE' ? 'text' : patch.newVNode.type;
    logs.push({ cls: 'create', msg: 'CREATE: ' + path + ' &mdash; &lt;' + tag + '&gt; 노드 추가' });
  } else if (patch.type === REMOVE) {
    logs.push({ cls: 'remove', msg: 'REMOVE: ' + path + ' &mdash; 노드 제거' });
  } else if (patch.type === REPLACE) {
    var t = patch.newVNode.type === 'TEXT_NODE' ? 'text("' + patch.newVNode.value.substring(0, 20) + '")' : patch.newVNode.type;
    logs.push({ cls: 'replace', msg: 'REPLACE: ' + path + ' &mdash; &lt;' + t + '&gt;로 교체' });
  } else if (patch.type === UPDATE) {
    if (patch.propPatches) {
      for (var i = 0; i < patch.propPatches.length; i++) {
        var pp = patch.propPatches[i];
        if (pp.action === 'SET') logs.push({ cls: 'update', msg: 'SET PROP: ' + path + ' &mdash; ' + pp.key + '="' + pp.value + '"' });
        else logs.push({ cls: 'update', msg: 'DEL PROP: ' + path + ' &mdash; ' + pp.key + ' 삭제' });
      }
    }
    if (patch.childPatches) {
      for (var j = 0; j < patch.childPatches.length; j++) {
        var cp = patch.childPatches[j];
        logs = logs.concat(patchToLogs(cp.patch, path + '[' + cp.index + ']'));
      }
    }
  }
  return logs;
}
function allLogs(containerPatches) {
  var logs = [];
  for (var i = 0; i < containerPatches.length; i++) {
    var cp = containerPatches[i];
    logs = logs.concat(patchToLogs(cp.patch, 'root[' + cp.index + ']'));
  }
  return logs;
}

// ═══════════════════════════════════════════════════════════════
// 6. APPLICATION — UI + 편집 도구
// ═══════════════════════════════════════════════════════════════

var actualArea, testArea, logEl, currentVNodes = [];
var selectedEl = null;

function addLog(cls, msg) {
  var d = document.createElement('div');
  d.className = 'log-entry log-' + cls;
  if (cls === 'divider') { d.textContent = msg; }
  else {
    var now = new Date();
    var t = ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2) + ':' + ('0' + now.getSeconds()).slice(-2);
    d.innerHTML = '<span class="log-time">[' + t + ']</span> ' + msg;
  }
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function updateUI() {
  document.getElementById('btn-undo').disabled = !stateHistory.canUndo();
  document.getElementById('btn-redo').disabled = !stateHistory.canRedo();
  var info = stateHistory.info();
  document.getElementById('history-indicator').textContent = 'State: ' + info.cur + ' / ' + info.total;
}

// ── 요소 선택 ──
function selectElement(el) {
  if (selectedEl) selectedEl.classList.remove('el-selected');
  if (!el || el === testArea || el.nodeType !== Node.ELEMENT_NODE) { selectedEl = null; return; }
  selectedEl = el;
  selectedEl.classList.add('el-selected');
}

// ── 편집 도구 함수들 ──

function toolMoveUp() {
  if (!selectedEl || !selectedEl.parentNode) return;
  var prev = selectedEl.previousElementSibling;
  if (prev) {
    selectedEl.parentNode.insertBefore(selectedEl, prev);
    addLog('info', '▲ 요소를 위로 이동 (순서 변경 감지)');
  }
}

function toolMoveDown() {
  if (!selectedEl || !selectedEl.parentNode) return;
  var next = selectedEl.nextElementSibling;
  if (next) {
    selectedEl.parentNode.insertBefore(next, selectedEl);
    addLog('info', '▼ 요소를 아래로 이동 (순서 변경 감지)');
  }
}

function toolEditAttrs() {
  if (!selectedEl) return;
  var list = document.getElementById('attr-list');
  list.innerHTML = '';
  for (var i = 0; i < selectedEl.attributes.length; i++) {
    var a = selectedEl.attributes[i];
    if (a.name === 'contenteditable' || a.name === 'class' && a.value.indexOf('el-selected') >= 0) continue;
    var val = a.value;
    if (a.name === 'class') val = val.replace(/\s*el-selected\s*/g, '').trim();
    addAttrRow(a.name, val);
  }
  document.getElementById('attr-modal').classList.add('show');
}

function addAttrRow(name, value) {
  var list = document.getElementById('attr-list');
  var row = document.createElement('div');
  row.className = 'modal-row';
  row.innerHTML = '<input type="text" placeholder="속성명" value="' + (name || '') + '"><input type="text" placeholder="값" value="' + (value || '').replace(/"/g, '&quot;') + '"><button class="del-attr" onclick="this.parentNode.remove()">X</button>';
  list.appendChild(row);
}

function saveAttrs() {
  if (!selectedEl) return;
  var toRemove = [];
  for (var i = 0; i < selectedEl.attributes.length; i++) {
    var n = selectedEl.attributes[i].name;
    if (n !== 'contenteditable') toRemove.push(n);
  }
  for (var j = 0; j < toRemove.length; j++) selectedEl.removeAttribute(toRemove[j]);

  var rows = document.getElementById('attr-list').querySelectorAll('.modal-row');
  var hasClass = false;
  for (var k = 0; k < rows.length; k++) {
    var inputs = rows[k].querySelectorAll('input');
    var key = inputs[0].value.trim();
    var val = inputs[1].value.trim();
    if (key) {
      if (key === 'class') { val += ' el-selected'; hasClass = true; }
      selectedEl.setAttribute(key, val);
      if (key === 'style') selectedEl.style.cssText = val;
    }
  }
  if (!hasClass) selectedEl.classList.add('el-selected');
  closeAttrModal();
  addLog('info', '⚙ 속성이 수정되었습니다.');
}

function closeAttrModal() { document.getElementById('attr-modal').classList.remove('show'); }

function toolChangeTag() {
  if (!selectedEl) return;
  var tag = selectedEl.tagName.toLowerCase();
  document.getElementById('current-tag-display').textContent = '<' + tag + '>';
  document.getElementById('tag-select').value = tag;
  document.getElementById('tag-modal').classList.add('show');
}

function saveTagChange() {
  if (!selectedEl) return;
  var newTag = document.getElementById('tag-select').value;
  var oldTag = selectedEl.tagName.toLowerCase();
  if (newTag === oldTag) { closeTagModal(); return; }

  var newEl = document.createElement(newTag);
  for (var i = 0; i < selectedEl.attributes.length; i++) {
    var a = selectedEl.attributes[i];
    if (a.name === 'contenteditable') continue;
    var val = a.value;
    if (a.name === 'class') val = val.replace(/\s*el-selected\s*/g, '').trim();
    if (val || a.name !== 'class') newEl.setAttribute(a.name, val);
  }
  while (selectedEl.firstChild) newEl.appendChild(selectedEl.firstChild);
  selectedEl.parentNode.replaceChild(newEl, selectedEl);
  selectElement(newEl);
  closeTagModal();
  addLog('info', '⟨⟩ 태그 변경: &lt;' + oldTag + '&gt; → &lt;' + newTag + '&gt;');
}

function closeTagModal() { document.getElementById('tag-modal').classList.remove('show'); }

function toolDuplicate() {
  if (!selectedEl || !selectedEl.parentNode) return;
  var clone = selectedEl.cloneNode(true);
  clone.classList.remove('el-selected');
  selectedEl.parentNode.insertBefore(clone, selectedEl.nextSibling);
  addLog('info', '⧉ 요소가 복제되었습니다.');
}

function toolAddChild() {
  if (!selectedEl) return;
  var child = document.createElement('div');
  child.textContent = '새 요소';
  child.style.cssText = 'padding:8px;border:1px dashed var(--accent);border-radius:4px;margin-top:8px;font-size:.82rem;color:var(--accent)';
  selectedEl.appendChild(child);
  addLog('info', '+ 자식 요소가 추가되었습니다.');
}

function toolAddSibling() {
  if (!selectedEl || !selectedEl.parentNode) return;
  var sibling = document.createElement('div');
  sibling.textContent = '새 요소';
  sibling.style.cssText = 'padding:8px;border:1px dashed var(--accent);border-radius:4px;margin-top:8px;font-size:.82rem;color:var(--accent)';
  selectedEl.parentNode.insertBefore(sibling, selectedEl.nextSibling);
  addLog('info', '+ 형제 요소가 추가되었습니다.');
}

function toolWrapEl() {
  if (!selectedEl || !selectedEl.parentNode) return;
  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'padding:8px;border:1px dashed var(--border);border-radius:4px';
  selectedEl.parentNode.insertBefore(wrapper, selectedEl);
  wrapper.appendChild(selectedEl);
  selectElement(wrapper);
  addLog('info', '⊞ 요소를 div로 감쌌습니다.');
}

function toolDelete() {
  if (!selectedEl || !selectedEl.parentNode) return;
  var tag = selectedEl.tagName.toLowerCase();
  selectedEl.parentNode.removeChild(selectedEl);
  selectedEl = null;
  addLog('info', '✕ &lt;' + tag + '&gt; 요소가 삭제되었습니다.');
}

// ── Patch / Undo / Redo ──

function handlePatch() {
  if (selectedEl) { selectedEl.classList.remove('el-selected'); selectedEl = null; }

  var newVNodes = containerToVNodes(testArea);
  var patches = diffChildren(currentVNodes, newVNodes);
  if (!patches.length) { addLog('info', '변경 사항이 없습니다.'); return; }

  var info = stateHistory.info();
  addLog('divider', '── Patch #' + info.total + ' ──');
  var logs = allLogs(patches);
  for (var i = 0; i < logs.length; i++) addLog(logs[i].cls, logs[i].msg);
  addLog('info', '총 ' + logs.length + '개의 변경 사항 적용');

  patchContainer(actualArea, patches);
  currentVNodes = cloneVNode(newVNodes);
  stateHistory.push(currentVNodes);
  updateUI();
}

function handleUndo() {
  var prev = stateHistory.undo();
  if (!prev) return;
  currentVNodes = prev;
  renderToContainer(currentVNodes, actualArea);
  renderToContainer(cloneVNode(currentVNodes), testArea);
  selectedEl = null;
  var info = stateHistory.info();
  addLog('info', '⟵ 뒤로가기: State ' + info.cur + ' / ' + info.total);
  updateUI();
}

function handleRedo() {
  var next = stateHistory.redo();
  if (!next) return;
  currentVNodes = next;
  renderToContainer(currentVNodes, actualArea);
  renderToContainer(cloneVNode(currentVNodes), testArea);
  selectedEl = null;
  var info = stateHistory.info();
  addLog('info', '⟶ 앞으로가기: State ' + info.cur + ' / ' + info.total);
  updateUI();
}

// ── 초기화 ──
function init() {
  actualArea = document.getElementById('actual-area');
  testArea = document.getElementById('test-area');
  logEl = document.getElementById('diff-log');

  actualArea.innerHTML = SAMPLE_HTML;
  currentVNodes = containerToVNodes(actualArea);
  renderToContainer(cloneVNode(currentVNodes), testArea);

  stateHistory.push(currentVNodes);
  updateUI();

  document.getElementById('btn-patch').onclick = handlePatch;
  document.getElementById('btn-undo').onclick = handleUndo;
  document.getElementById('btn-redo').onclick = handleRedo;
  document.getElementById('btn-clear').onclick = function() { logEl.innerHTML = ''; addLog('info', '로그 초기화'); };

  testArea.addEventListener('click', function(e) {
    var target = e.target;
    if (target === testArea) { selectElement(null); return; }
    selectElement(target);
  });

  addLog('info', 'Google Earth Explorer 초기화 완료!');
  addLog('info', '테스트 영역에서 마커, 패널, 레이어 등을 자유롭게 수정하세요.');
  addLog('info', '마커 위치 변경, 지명 수정, 속성 편집, 요소 추가/삭제 후 Patch!');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
